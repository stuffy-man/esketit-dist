
[Deposits]
	#Disables large deposits of a certain type
	#Allowed Values: NONE, VANILLA, CUSTOM, ALL
	disabledDeposits = "NONE"
	#Size multiplier to be applied to all deposits
	#Range: 0.0 ~ 10.0
	globalSizeMultiplier = 1.5
	#Spawn rate multiplier to be applied to all deposits
	#Range: 0.0 ~ 10.0
	globalSpawnRateMultiplier = 4.0

[Veins]
	#Disables all large ore veins generated by the vanilla noise generator
	disableVanillaLargeVeins = true
	#Disables small ore veins of a certain type
	#Allowed Values: NONE, VANILLA, CUSTOM, MODDED, ALL, ALL_BUT_CUSTOM, ALL_BUT_VANILLA, ALL_BUT_MODDED
	disabledVeins = "ALL"
	#If enabled, all non-ore veins such as andesite, granite, diorite, dirt, etc. will also be affected by these settings
	includeNonOreVeins = false

[Indicators]
	#Enables/disables all above-ground indicators
	enabled = true
	#If enabled and the dimension has a ceiling (e.g. the Nether), the indicators will only spawn on the top surface of the ceiling
	alwaysOnCeiling = false

[Features]
	#Disables generation of the listed features in the world
	#Format: ["modID:feature1", "modID:feature2"]
	#To disable all generated features of the specified mod, use "modID:*"
	#To see available features, use the '/place feature' command
	#
	disabledFeatures = ["minecraft:ore_coal_lower", "minecraft:ore_coal_upper", "minecraft:ore_iron_middle", "minecraft:ore_iron_small", "minecraft:ore_iron_upper", "minecraft:ore_copper", "minecraft:ore_copper_large", "minecraft:ore_gold", "minecraft:ore_gold_extra", "minecraft:ore_gold_lower", "minecraft:ore_redstone", "minecraft:ore_redstone_lower", "minecraft:ore_lapis", "minecraft:ore_lapis_buried", "minecraft:ore_diamond", "minecraft:ore_diamond_buried", "minecraft:ore_diamond_large", "minecraft:ore_diamond_medium", "minecraft:ore_emerald", "minecraft:ore_ancient_debris_large", "minecraft:ore_debris_small", "wythers:ores/ore_iron_windswept", "wythers:ores/ore_coal_windswept", "wythers:ores/ore_redstone_windswept", "wythers:ores/ore_diamond_volcanic", "caverns_and_chasms:ore_tin", "caverns_and_chasms:ore_silver_buried_with_gold", "caverns_and_chasms:ore_silver_extra", "caverns_and_chasms:ore_gold_and_silver_lower"]

[Stripper]
	#Automatically dress previously stripped chunks before unloading them to prevent data loss
	dressUnloadedChunks = true

