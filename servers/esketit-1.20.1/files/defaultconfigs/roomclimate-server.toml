
[general]
	#Master switch for the room climate simulation.
	enabled = true
	#How often each player re-scans their current room.
	#Range: 5 ~ 400
	scanIntervalTicks = 20
	#Maximum number of breathable blocks scanned per room.
	#Range: 32 ~ 2048
	maxRoomVolume = 384
	#Maximum room radius around the player, in blocks.
	#Range: 4 ~ 32
	maxRoomRadius = 12
	#How long an unseen room keeps its thermal charge in memory.
	#Range: 200 ~ 240000
	roomMemoryTicks = 12000
	#Show a compact thermal readout in the action bar.
	showActionBar = false

[enclosure]
	#Minimum seal factor required before a room counts as enclosed.
	#Range: 0.1 ~ 1.0
	minSealFactor = 0.65
	#Leak penalty applied to closed doors, trapdoors and fence gates.
	#Range: 0.0 ~ 5.0
	closedDoorLeakPenalty = 0.22
	#Leak penalty applied to open doors, trapdoors and fence gates.
	#Range: 0.0 ~ 5.0
	openDoorLeakPenalty = 1.1
	#Leak penalty applied to partial walls such as bars and open frames.
	#Range: 0.0 ~ 5.0
	partialBlockLeakPenalty = 0.35

[thermal_response]
	#How quickly a room approaches a positive thermal charge.
	#Range: 1.0E-4 ~ 0.2
	heatGainPerTick = 0.012
	#How quickly a room approaches a negative thermal charge.
	#Range: 1.0E-4 ~ 0.2
	coldGainPerTick = 0.012
	#How quickly an unused room drifts back toward neutral.
	#Range: 1.0E-4 ~ 0.2
	neutralDriftPerTick = 0.0025
	#How much a fully sealed room gains per tick from each point of heat source strength.
	#Range: 1.0E-5 ~ 0.02
	heatChargePerTick = 0.00125
	#How much a fully sealed room loses per tick from each point of cold source strength.
	#Range: 1.0E-5 ~ 0.02
	coldChargePerTick = 0.00125
	#Base dissipation applied to any charged room, even when perfectly sealed.
	#Range: 1.0E-5 ~ 0.02
	ambientDissipationPerTick = 1.8E-4
	#Extra dissipation multiplier applied by real openings to the outside.
	#Range: 1.0E-5 ~ 0.05
	openingDissipationPerTick = 0.0075
	#Maximum world temperature offset applied to the player in Minecraft units.
	#Range: 0.05 ~ 3.0
	maxWorldTemperatureOffset = 1.0
	#Extra multiplier applied when bridging into Cold Sweat attributes.
	#Range: 0.0 ~ 5.0
	coldSweatScale = 1.0

[compatibility]
	#Use keyword heuristics so unknown blocks from other mods can still emit heat or cold.
	allowKeywordHeuristics = true
	#Exact block heat overrides in the format namespace:block=value
	heatOverrides = ["minecraft:lava=2.6", "minecraft:lava_cauldron=2.2", "minecraft:fire=2.0", "minecraft:campfire=1.5", "minecraft:magma_block=0.9", "minecraft:furnace=1.1", "minecraft:smoker=1.2", "minecraft:blast_furnace=1.3", "cold_sweat:boiler=1.8", "create:blaze_burner=1.8", "create:lit_blaze_burner=1.9", "mekanism:resistive_heater=1.6", "mekanism:fuelwood_heater=1.4", "mekanism:superheating_element=1.9", "mekanism:thermal_evaporation_controller=1.4", "thermal:machine_furnace=1.1", "thermal:machine_smelter=1.2", "thermal:machine_crucible=1.5", "thermal:machine_pyrolyzer=1.4", "thermal:dynamo_compression=1.3"]
	#Exact block cold overrides in the format namespace:block=value
	coldOverrides = ["minecraft:ice=0.5", "minecraft:packed_ice=0.85", "minecraft:blue_ice=1.2", "minecraft:snow_block=0.35", "minecraft:powder_snow=0.75", "minecraft:soul_fire=0.7", "minecraft:soul_campfire=0.9", "cold_sweat:icebox=1.8", "thermal:machine_chiller=1.2"]
	#Path fragments that count as heat sources when no exact rule exists.
	heatKeywords = ["heater", "boiler", "burner", "furnace", "smoker", "smelter", "kiln", "magma", "reactor", "crucible", "pyrolyzer", "superheating", "evaporation", "dynamo", "lava", "fire", "campfire", "blaze"]
	#Path fragments that count as cold sources when no exact rule exists.
	coldKeywords = ["ice", "packed_ice", "blue_ice", "snow", "icebox", "chiller", "freezer", "cooler", "fridge", "cryo", "frost", "cold"]

